name: Test Local Action

on:
  workflow_call:
  workflow_dispatch: # to trigger manually

permissions:
  actions: write
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # Test 1: Single-line JSON
      # -----------------------------------------------------------------------
      - name: 🧪 Test single-line JSON
        id: test-single
        uses: ./
        with:
          file-path: test-data/single-line.json

      - name: ✓ Verify single-line JSON
        run: |
          source scripts/test-helper.sh
          
          # Display outputs
          display_outputs \
            "${{ steps.test-single.outputs.file-exists }}" \
            "${{ steps.test-single.outputs.is-valid-json }}" \
            "${{ steps.test-single.outputs.json-content }}" \
            "true"
          
          # Run test with parsed values
          test_single_line_json \
            "${{ steps.test-single.outputs.file-exists }}" \
            "${{ steps.test-single.outputs.is-valid-json }}" \
            "${{ fromJSON(steps.test-single.outputs.json-content).name }}" \
            "${{ fromJSON(steps.test-single.outputs.json-content).version }}" \
            "${{ fromJSON(steps.test-single.outputs.json-content).active }}"
